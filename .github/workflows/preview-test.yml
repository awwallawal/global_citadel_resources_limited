name: Preview Deployment Tests

on:
  deployment_status:

jobs:
  preview-test:
    name: E2E & Lighthouse on Preview
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment != 'Production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests against preview
        run: npx playwright test tests/e2e/navigation.spec.ts tests/e2e/contact-form.spec.ts --project=chromium
        env:
          CI: true
          BASE_URL: ${{ github.event.deployment_status.target_url }}

      - name: Lighthouse CI against preview
        run: |
          npx lhci autorun \
            --collect.url="${{ github.event.deployment_status.target_url }}/" \
            --collect.url="${{ github.event.deployment_status.target_url }}/about/" \
            --collect.url="${{ github.event.deployment_status.target_url }}/contact/general/" \
            --collect.startServerCommand="" \
            --collect.settings.chromeFlags="--no-sandbox --headless"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ github.event.deployment_status.target_url }}';
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            console.log(`${emoji} Preview tests ${status} for: ${deployUrl}`);
