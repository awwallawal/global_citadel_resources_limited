tagline: "Building Nigeria's protein infrastructure through modern livestock management"
overview: |
  The Animal Husbandry division operates integrated livestock production systems designed to address Nigeria's growing demand for quality animal protein. Our operations span cattle ranching, poultry farming, and aquaculture, with each programme built on modern animal welfare standards and veterinary oversight.

  GRCL's livestock facilities employ controlled-environment housing, automated feeding systems, and rigorous biosecurity protocols that ensure consistent product quality and animal health. The division works closely with the Agro-Processing arm to create a seamless farm-to-market supply chain, minimising waste and maximising the value extracted from every production cycle.

  With Nigeria importing billions of naira worth of animal protein annually, the Animal Husbandry division is positioned to capture domestic market share while building the technical capacity for eventual export readiness across the West African region.
