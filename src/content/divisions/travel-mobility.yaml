tagline: "Moving people across borders for business, pilgrimage, study, and a better life — with the discipline of an institutional operator."
overview: |
  Global Resources Citadel's Travel & Mobility division brings the same execution standards that define the Group's commodity and trade operations to a different kind of cargo: people. Operating from offices in Lagos and London, the division delivers full-service travel and mobility solutions for corporate clients, individual travellers, religious pilgrims, students, and families relocating across borders.

  Where most travel businesses focus on a single product line, Travel & Mobility integrates corporate travel management, leisure tour operation, inbound destination services, religious pilgrimage logistics, education and study-abroad pathways, and work-permit and relocation support under one accountable operator. This breadth means GRCL can serve a Group employee booking a business trip, a family planning Hajj, a student preparing to study in the UK, and a professional relocating for work — all from the same organisation, with the same standards of compliance, documentation, and aftercare.

  The division's value comes from operational discipline, not retail price competition. With trade finance, customs, and cross-border logistics expertise already embedded in the Trade & Services cluster, Travel & Mobility extends those capabilities into the movement of people — handling visa processes, embassy liaison, immigration documentation, and on-the-ground support that less experienced operators routinely fumble.

