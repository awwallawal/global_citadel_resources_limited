  - icon: graduation-cap
    name: Education & Study Abroad
    description: "Student placement and study-abroad support — university admissions guidance, student visa processing, accommodation arrangement, and pre-departure orientation."
  - icon: plane-takeoff
    name: Work Permits & Relocation
    description: "Skilled-worker visa support and family relocation services — work permit applications, document preparation, settlement logistics, and post-arrival assistance."

