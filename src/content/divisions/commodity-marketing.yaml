tagline: "Connecting African commodities to continental and global markets"
overview: |
  Global Resources Citadel's Commodity Marketing division serves as the commercial engine of the Group's trade operations, managing the sourcing, aggregation, and sale of agricultural commodities across domestic and international markets. The division handles high-volume transactions in grains, oilseeds, and cash crops, leveraging deep market intelligence and established buyer relationships.

  Operating from strategically located trading offices, the division provides price discovery, logistics coordination, and risk management services that help African producers access premium markets. With the African Continental Free Trade Area (AfCFTA) opening new corridors for intra-African commerce, the division is positioned to capitalise on the continent's expanding trade infrastructure. Our trading desks maintain relationships with food manufacturers, export houses, and institutional buyers across West Africa, the Middle East, and Europe.

  The Commodity Marketing division's strength lies in its ability to aggregate supply from multiple sources — including GRCL's own farming operations — and deliver consistent quality and volume to buyers who require reliability above all else.
