tagline: "Strategic investments in real estate and energy infrastructure for Africa's next growth phase."
overview: |
  The Built Environment & Energy cluster represents Global Resources Citadel's forward-looking investments in two of Africa's highest-growth sectors. Through the Real Estate and Oil & Gas divisions, GRCL is building presence in markets that benefit from Africa's rapid urbanisation, population growth, and evolving energy needs.

  Africa's housing deficit exceeds 50 million units — with Nigeria alone accounting for 17 million — while energy demand across the continent continues to outpace supply infrastructure. GRCL's Built Environment & Energy cluster targets specific opportunities within these massive markets — quality commercial and residential development in growth corridors, and downstream energy distribution that leverages existing logistics capabilities.

  As aspirational verticals, these divisions are building operational track records and market relationships with a long-term view. The cluster benefits from GRCL's established commercial infrastructure and land assets, providing a cost-effective entry point into sectors that will define Africa's economic landscape for decades to come.
