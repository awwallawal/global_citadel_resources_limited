tagline: "Strategic investments in real estate and energy infrastructure for Nigeria's next growth phase."
overview: |
  The Built Environment & Energy cluster represents Global Resources Citadel's forward-looking investments in two of Nigeria's highest-growth sectors. Through the Real Estate and Oil & Gas divisions, GRCL is building presence in markets that benefit from the country's rapid urbanisation, population growth, and evolving energy needs.

  Nigeria's housing deficit exceeds 17 million units, while energy demand continues to outpace supply infrastructure. GRCL's Built Environment & Energy cluster targets specific opportunities within these massive markets — quality commercial and residential development in growth corridors, and downstream energy distribution that leverages existing logistics capabilities.

  As aspirational verticals, these divisions are building operational track records and market relationships with a long-term view. The cluster benefits from GRCL's established commercial infrastructure and land assets, providing a cost-effective entry point into sectors that will define Nigeria's economic landscape for decades to come.
