name: Joshua Adeyemi
title: Company Secretary / Executive Director, Governance
bio: |
  Joshua Adeyemi serves as Company Secretary and Executive Director of Governance at GRCL, responsible for corporate compliance, regulatory affairs, and the legal framework that supports the Group's operations across Nigeria and the broader West African region. He ensures GRCL meets all obligations under the Companies and Allied Matters Act (CAMA) and maintains the governance standards expected by institutional partners and investors.

  Joshua brings extensive experience in corporate governance, legal compliance, and stakeholder management, providing the governance infrastructure that underpins GRCL's credibility as a pan-African conglomerate.
briefDescriptor: "Leads corporate governance, compliance, and regulatory affairs"
