name: Olatunde Oluseye Taiwo Thomas
title: Group Managing Director / CEO
bio: |
  Olatunde Thomas leads Global Resources Citadel Limited as Group Managing Director and Chief Executive Officer, setting the strategic direction for the Group's operations across seven business divisions and three strategic clusters. Under his leadership, GRCL has grown from its agricultural foundations into a diversified pan-African conglomerate with operations and partnerships extending across West Africa.

  With deep expertise in agribusiness, commodity trading, and corporate strategy, Olatunde brings the vision and operational discipline required to manage a multi-sector portfolio across Africa's fastest-growing markets.
briefDescriptor: "Leads GRCL's strategic direction across all seven divisions"
