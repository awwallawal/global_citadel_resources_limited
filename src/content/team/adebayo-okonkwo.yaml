name: Adebayo Okonkwo
title: Group Managing Director
bio: |
  Adebayo Okonkwo has led Global Resources Citadel Limited as Group Managing Director since 2015, overseeing the Group's expansion from its agricultural roots into a diversified conglomerate spanning seven business divisions. With over 25 years of experience in Nigerian agribusiness and commodity trading, he brings deep operational knowledge and strategic vision to GRCL's leadership.

  Prior to joining GRCL, Adebayo held senior positions at leading Nigerian agricultural enterprises and spent several years in international commodity trading in London. He holds an MBA from Lagos Business School and is a Fellow of the Nigerian Institute of Management.
briefDescriptor: "Leads GRCL's strategic direction across all seven divisions"
