name: Ngozi Eze
title: Chief Financial Officer
bio: |
  Ngozi Eze oversees GRCL's financial strategy, capital allocation, and investor relations. She joined the Group in 2018, bringing two decades of experience in corporate finance and audit across Nigeria's agriculture and energy sectors. Under her stewardship, GRCL has secured strategic financing for key expansion projects and maintained robust financial governance.

  Ngozi is a Chartered Accountant (ICAN) and holds a Master's degree in Finance from the University of Lagos. She serves on the board of several Nigerian industry associations and is recognised for her expertise in financial structuring for agricultural enterprises.
briefDescriptor: "Oversees financial strategy, governance, and investor relations"
