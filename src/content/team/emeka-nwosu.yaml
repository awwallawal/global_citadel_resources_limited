name: Emeka Nwosu
title: Director of Operations
bio: |
  Emeka Nwosu manages the day-to-day operations of GRCL's agricultural and processing divisions, ensuring production targets are met while maintaining quality and safety standards. With a background in agricultural engineering and over 18 years in farm management, he has been instrumental in modernising GRCL's farming operations and introducing mechanised cultivation practices.

  Emeka holds a degree in Agricultural Engineering from the Federal University of Technology, Akure, and has completed executive programmes in supply chain management and agribusiness leadership.
briefDescriptor: "Manages daily operations across agricultural divisions"
