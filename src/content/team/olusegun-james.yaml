name: Olusegun James
title: Chief Financial Officer
bio: |
  Olusegun James oversees GRCL's financial strategy, capital allocation, and investor relations. As Chief Financial Officer, he is responsible for financial governance, trade finance, and the commercial structuring that underpins the Group's growth across multiple African markets.

  Olusegun brings deep expertise in corporate finance, financial planning, and risk management across agriculture, trade, and energy sectors, ensuring robust financial discipline as the Group scales its pan-African operations.
briefDescriptor: "Oversees financial strategy, governance, and investor relations"
