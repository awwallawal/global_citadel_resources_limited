name: Jessica Yetunde Ganiat Olagunju
title: Chief Operating Officer
bio: |
  Jessica Olagunju oversees the day-to-day operations of GRCL's eight business divisions, ensuring operational excellence across the Group's agricultural, trade, mobility, and infrastructure verticals. As Chief Operating Officer, she is responsible for coordinating cross-divisional activities, optimising supply chain integration, and driving performance across the three strategic clusters.

  Jessica brings extensive experience in multi-sector operations management, with a track record of building efficient processes and high-performing teams across complex business environments.
briefDescriptor: "Manages day-to-day operations across all divisions and clusters"
sortOrder: 2
featured: true
