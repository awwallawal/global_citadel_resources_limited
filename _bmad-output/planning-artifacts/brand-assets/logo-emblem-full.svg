<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&amp;display=swap');
    </style>

    <!-- Sky gradient behind sun -->
    <radialGradient id="skyGlow" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="35%" stop-color="#FFB300"/>
      <stop offset="65%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>

    <!-- Sun gradient -->
    <radialGradient id="sunGrad" cx="0.45" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="50%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </radialGradient>

    <!-- Shield body gradient -->
    <linearGradient id="shieldBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0D3B13"/>
    </linearGradient>

    <!-- Shield inner gradient -->
    <linearGradient id="shieldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>

    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>

    <!-- Leaf dark gradient -->
    <linearGradient id="leafDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#388E3C"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>

    <!-- Banner gradient -->
    <linearGradient id="bannerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0D3B13"/>
    </linearGradient>

    <!-- Gold trim gradient -->
    <linearGradient id="goldTrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF6A"/>
      <stop offset="40%" stop-color="#B48A3E"/>
      <stop offset="100%" stop-color="#8A6A2E"/>
    </linearGradient>

    <!-- Gold light gradient -->
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#D4AF6A"/>
    </linearGradient>

    <!-- Clip for inner scene -->
    <clipPath id="shieldClip">
      <path d="M60 55 L340 55 L340 240 C340 310 280 365 200 385
               C120 365 60 310 60 240 Z"/>
    </clipPath>
  </defs>

  <!-- ============================================ -->
  <!-- OUTER SHIELD — dark green with gold border   -->
  <!-- ============================================ -->

  <!-- Gold outer border -->
  <path d="M45 42 Q45 25 62 25 L338 25 Q355 25 355 42
           L355 245 C355 320 285 375 200 398
           C115 375 45 320 45 245 Z"
        fill="url(#goldTrim)" stroke="#8A6A2E" stroke-width="2"/>

  <!-- Dark green shield body -->
  <path d="M52 48 Q52 32 66 32 L334 32 Q348 32 348 48
           L348 242 C348 314 280 368 200 390
           C120 368 52 314 52 242 Z"
        fill="url(#shieldBody)"/>

  <!-- Inner gold trim line -->
  <path d="M62 55 Q62 42 74 42 L326 42 Q338 42 338 55
           L338 238 C338 306 274 358 200 378
           C126 358 62 306 62 238 Z"
        fill="none" stroke="#B48A3E" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- TOP SCROLLWORK / FLOURISH                    -->
  <!-- ============================================ -->

  <!-- Center crown flourish -->
  <path d="M200 18 C200 10 200 8 200 4 C202 8 204 12 208 14
           C212 10 216 8 220 10 C218 14 214 16 212 20
           C216 18 222 16 226 18 C224 22 218 24 214 24
           C218 26 224 28 226 32 L200 25
           Z" fill="url(#goldTrim)"/>
  <!-- Mirror left -->
  <path d="M200 18 C200 10 200 8 200 4 C198 8 196 12 192 14
           C188 10 184 8 180 10 C182 14 186 16 188 20
           C184 18 178 16 174 18 C176 22 182 24 186 24
           C182 26 176 28 174 32 L200 25
           Z" fill="url(#goldTrim)"/>

  <!-- Side scrollwork — left -->
  <path d="M52 70 C38 72 30 80 28 90 C26 100 30 108 38 110
           C30 115 26 125 30 135 C34 140 40 142 46 140"
        fill="none" stroke="url(#goldTrim)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="28" cy="90" r="3" fill="#D4AF6A"/>
  <circle cx="28" cy="130" r="3" fill="#D4AF6A"/>

  <!-- Side scrollwork — right -->
  <path d="M348 70 C362 72 370 80 372 90 C374 100 370 108 362 110
           C370 115 374 125 370 135 C366 140 360 142 354 140"
        fill="none" stroke="url(#goldTrim)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="372" cy="90" r="3" fill="#D4AF6A"/>
  <circle cx="372" cy="130" r="3" fill="#D4AF6A"/>

  <!-- ============================================ -->
  <!-- INNER SCENE — sky, sun, landscape, leaves    -->
  <!-- ============================================ -->
  <g clip-path="url(#shieldClip)">

    <!-- Sky background -->
    <rect x="60" y="55" width="280" height="340" fill="#FF8F00"/>

    <!-- Sky glow behind sun -->
    <circle cx="200" cy="190" r="160" fill="url(#skyGlow)"/>

    <!-- Clouds -->
    <ellipse cx="120" cy="110" rx="45" ry="14" fill="#FFE082" opacity="0.3"/>
    <ellipse cx="300" cy="100" rx="35" ry="12" fill="#FFE082" opacity="0.25"/>
    <ellipse cx="90" cy="145" rx="30" ry="10" fill="#FFE082" opacity="0.2"/>
    <ellipse cx="320" cy="140" rx="28" ry="9" fill="#FFE082" opacity="0.2"/>

    <!-- Birds (simple V shapes) -->
    <path d="M130 85 L134 82 L138 85" fill="none" stroke="#8A6A2E" stroke-width="1.2" opacity="0.4"/>
    <path d="M280 75 L283 72 L286 75" fill="none" stroke="#8A6A2E" stroke-width="1" opacity="0.35"/>
    <path d="M155 70 L158 68 L161 71" fill="none" stroke="#8A6A2E" stroke-width="1" opacity="0.3"/>

    <!-- Sun rays — radiating lines -->
    <g opacity="0.5">
      <line x1="200" y1="175" x2="200" y2="80" stroke="#FFD54F" stroke-width="3"/>
      <line x1="200" y1="175" x2="145" y2="90" stroke="#FFD54F" stroke-width="2.5"/>
      <line x1="200" y1="175" x2="255" y2="90" stroke="#FFD54F" stroke-width="2.5"/>
      <line x1="200" y1="175" x2="100" y2="120" stroke="#FFD54F" stroke-width="2"/>
      <line x1="200" y1="175" x2="300" y2="120" stroke="#FFD54F" stroke-width="2"/>
      <line x1="200" y1="175" x2="80" y2="160" stroke="#FFD54F" stroke-width="1.5"/>
      <line x1="200" y1="175" x2="320" y2="160" stroke="#FFD54F" stroke-width="1.5"/>
      <line x1="200" y1="175" x2="120" y2="100" stroke="#FFD54F" stroke-width="2"/>
      <line x1="200" y1="175" x2="280" y2="100" stroke="#FFD54F" stroke-width="2"/>
    </g>

    <!-- Sun disc -->
    <circle cx="200" cy="175" r="42" fill="url(#sunGrad)"/>
    <circle cx="200" cy="175" r="35" fill="#FFE082" opacity="0.3"/>

    <!-- Rolling green hills / landscape -->
    <path d="M60 260 C100 230 140 240 180 235 C220 230 260 220 300 235 C330 245 350 250 340 260 L340 400 L60 400 Z"
          fill="#2E7D32" opacity="0.5"/>
    <path d="M60 275 C120 255 160 265 200 258 C240 252 290 248 340 270 L340 400 L60 400 Z"
          fill="#1B5E20" opacity="0.4"/>

    <!-- === THREE GREEN LEAVES — foreground === -->

    <!-- Left leaf -->
    <path d="M200 340 C175 320 120 285 100 240
             C88 212 92 188 108 175 C118 168 130 170 140 180
             C150 190 155 210 158 232
             C162 260 178 300 200 340 Z"
          fill="url(#leafGrad)" stroke="#1B5E20" stroke-width="1.5"/>
    <!-- Left leaf midrib -->
    <path d="M200 335 C178 310 140 268 105 215"
          fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.5"/>
    <!-- Left leaf side veins -->
    <path d="M155 270 C140 260 125 255 112 245" fill="none" stroke="#1B5E20" stroke-width="0.8" opacity="0.3"/>
    <path d="M168 295 C152 282 135 275 122 268" fill="none" stroke="#1B5E20" stroke-width="0.8" opacity="0.3"/>
    <path d="M140 242 C130 235 118 230 110 222" fill="none" stroke="#1B5E20" stroke-width="0.8" opacity="0.3"/>

    <!-- Center leaf (slightly behind, pointing straight up) -->
    <path d="M200 340 C192 310 184 270 182 235
             C180 210 185 190 200 178
             C215 190 220 210 218 235
             C216 270 208 310 200 340 Z"
          fill="url(#leafDark)" stroke="#1B5E20" stroke-width="1.5"/>
    <!-- Center leaf midrib -->
    <path d="M200 335 L200 185"
          fill="none" stroke="#0D3B13" stroke-width="1.5" opacity="0.4"/>

    <!-- Right leaf -->
    <path d="M200 340 C225 320 280 285 300 240
             C312 212 308 188 292 175 C282 168 270 170 260 180
             C250 190 245 210 242 232
             C238 260 222 300 200 340 Z"
          fill="url(#leafGrad)" stroke="#1B5E20" stroke-width="1.5"/>
    <!-- Right leaf midrib -->
    <path d="M200 335 C222 310 260 268 295 215"
          fill="none" stroke="#1B5E20" stroke-width="1.5" opacity="0.5"/>
    <!-- Right leaf side veins -->
    <path d="M245 270 C260 260 275 255 288 245" fill="none" stroke="#1B5E20" stroke-width="0.8" opacity="0.3"/>
    <path d="M232 295 C248 282 265 275 278 268" fill="none" stroke="#1B5E20" stroke-width="0.8" opacity="0.3"/>
    <path d="M260 242 C270 235 282 230 290 222" fill="none" stroke="#1B5E20" stroke-width="0.8" opacity="0.3"/>

  </g>

  <!-- ============================================ -->
  <!-- WHEAT SHEAVES — flanking the shield          -->
  <!-- ============================================ -->

  <!-- Left wheat sheaf -->
  <g transform="translate(42, 260) rotate(-15)">
    <!-- Stalk -->
    <line x1="0" y1="0" x2="0" y2="90" stroke="#B48A3E" stroke-width="2"/>
    <!-- Grains -->
    <ellipse cx="-3" cy="8" rx="4" ry="10" fill="#D4AF6A" transform="rotate(-20)"/>
    <ellipse cx="3" cy="5" rx="4" ry="10" fill="#D4AF6A" transform="rotate(15)"/>
    <ellipse cx="-5" cy="22" rx="3.5" ry="9" fill="#D4AF6A" transform="rotate(-25)"/>
    <ellipse cx="5" cy="20" rx="3.5" ry="9" fill="#D4AF6A" transform="rotate(20)"/>
    <ellipse cx="-2" cy="36" rx="3" ry="8" fill="#D4AF6A" transform="rotate(-15)"/>
    <ellipse cx="4" cy="34" rx="3" ry="8" fill="#D4AF6A" transform="rotate(18)"/>
    <ellipse cx="0" cy="0" rx="3.5" ry="9" fill="#E8C96A"/>
  </g>

  <!-- Right wheat sheaf -->
  <g transform="translate(358, 260) rotate(15)">
    <line x1="0" y1="0" x2="0" y2="90" stroke="#B48A3E" stroke-width="2"/>
    <ellipse cx="3" cy="8" rx="4" ry="10" fill="#D4AF6A" transform="rotate(20)"/>
    <ellipse cx="-3" cy="5" rx="4" ry="10" fill="#D4AF6A" transform="rotate(-15)"/>
    <ellipse cx="5" cy="22" rx="3.5" ry="9" fill="#D4AF6A" transform="rotate(25)"/>
    <ellipse cx="-5" cy="20" rx="3.5" ry="9" fill="#D4AF6A" transform="rotate(-20)"/>
    <ellipse cx="2" cy="36" rx="3" ry="8" fill="#D4AF6A" transform="rotate(15)"/>
    <ellipse cx="-4" cy="34" rx="3" ry="8" fill="#D4AF6A" transform="rotate(-18)"/>
    <ellipse cx="0" cy="0" rx="3.5" ry="9" fill="#E8C96A"/>
  </g>

  <!-- ============================================ -->
  <!-- BANNER — dark green ribbon with gold text    -->
  <!-- ============================================ -->

  <!-- Banner ribbon shape -->
  <path d="M68 340 L55 340 L65 355 L55 370 L68 370
           L80 358 L320 358 L332 370
           L345 370 L335 355 L345 340 L332 340
           L320 348 L80 348 Z"
        fill="url(#bannerGrad)" stroke="#B48A3E" stroke-width="1.5"/>

  <!-- Banner text -->
  <text x="200" y="357" text-anchor="middle"
        fill="#D4AF6A" font-family="Poppins, sans-serif"
        font-weight="700" font-size="14.5" letter-spacing="2.5">GLOBAL RESOURCES CITADEL LTD.</text>

  <!-- ============================================ -->
  <!-- GLOBE — small gold globe at bottom           -->
  <!-- ============================================ -->

  <circle cx="200" cy="390" r="12" fill="none" stroke="url(#goldTrim)" stroke-width="2"/>
  <!-- Globe meridian lines -->
  <ellipse cx="200" cy="390" rx="6" ry="12" fill="none" stroke="#B48A3E" stroke-width="1" opacity="0.6"/>
  <line x1="188" y1="390" x2="212" y2="390" stroke="#B48A3E" stroke-width="1" opacity="0.6"/>
  <!-- Globe latitude -->
  <ellipse cx="200" cy="384" rx="10" ry="3" fill="none" stroke="#B48A3E" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="200" cy="396" rx="10" ry="3" fill="none" stroke="#B48A3E" stroke-width="0.8" opacity="0.4"/>

  <!-- Bottom scrollwork accent -->
  <path d="M170 415 C180 410 190 412 200 408 C210 412 220 410 230 415"
        fill="none" stroke="#B48A3E" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="406" r="2" fill="#D4AF6A"/>

</svg>
