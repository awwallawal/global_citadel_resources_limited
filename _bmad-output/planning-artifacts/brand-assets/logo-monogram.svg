<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700&amp;display=swap');
    </style>
    <radialGradient id="grcGreen" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532D"/>
    </radialGradient>
  </defs>

  <!-- GRC Monogram — Enhanced: gradient depth, crowned pinnacles, premium ring -->

  <!-- Outer gold ring — confident 3px weight -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#B48A3E" stroke-width="3"/>

  <!-- Inner accent ring — subtle double-border for premium feel -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#B48A3E" stroke-width="0.5" opacity="0.3"/>

  <!-- Green circle with radial gradient for depth -->
  <circle cx="50" cy="50" r="41" fill="url(#grcGreen)"/>

  <!-- Crown motif — three geometric pinnacles (citadel towers / growing grain) -->
  <!-- Center pinnacle (tallest) -->
  <path d="M50 13 L47 23 L50 32 L53 23 Z" fill="#D4AF6A" opacity="0.8"/>
  <!-- Left pinnacle -->
  <path d="M41 18 L38.5 25.5 L42 31 L43.5 24 Z" fill="#D4AF6A" opacity="0.5"/>
  <!-- Right pinnacle -->
  <path d="M59 18 L56.5 24 L58 31 L61.5 25.5 Z" fill="#D4AF6A" opacity="0.5"/>

  <!-- GRC monogram text -->
  <text x="50" y="62" text-anchor="middle" fill="#FFFFFF" font-family="Poppins, sans-serif" font-weight="700" font-size="23" letter-spacing="3">GRC</text>

  <!-- Subtle gold accent underline -->
  <line x1="30" y1="70" x2="70" y2="70" stroke="#D4AF6A" stroke-width="0.75" opacity="0.35"/>
</svg>
