<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 290" width="240" height="290">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&amp;display=swap');
    </style>
    <radialGradient id="shieldGreen" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532D"/>
    </radialGradient>
    <radialGradient id="sunGold" cx="0.45" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#D4AF6A"/>
      <stop offset="100%" stop-color="#B48A3E"/>
    </radialGradient>
  </defs>

  <!-- Evolved GRCL emblem — original sun+leaves soul, new brand palette -->

  <!-- Shield background — deep forest green with gradient depth -->
  <path d="M120 8 C180 8 215 35 215 65 L215 155 C215 210 175 250 120 270 C65 250 25 210 25 155 L25 65 C25 35 60 8 120 8 Z" fill="url(#shieldGreen)"/>

  <!-- Gold border on shield -->
  <path d="M120 8 C180 8 215 35 215 65 L215 155 C215 210 175 250 120 270 C65 250 25 210 25 155 L25 65 C25 35 60 8 120 8 Z"
        fill="none" stroke="#B48A3E" stroke-width="2.5"/>

  <!-- Sun rays — warm gold, 12 rays alternating long/short -->
  <g transform="translate(120, 88)">
    <polygon points="0,-52 -5,-17 5,-17" fill="#D4AF6A" opacity="0.85" transform="rotate(0)"/>
    <polygon points="0,-43 -4,-17 4,-17" fill="#D4AF6A" opacity="0.65" transform="rotate(30)"/>
    <polygon points="0,-52 -5,-17 5,-17" fill="#D4AF6A" opacity="0.85" transform="rotate(60)"/>
    <polygon points="0,-43 -4,-17 4,-17" fill="#D4AF6A" opacity="0.65" transform="rotate(90)"/>
    <polygon points="0,-52 -5,-17 5,-17" fill="#D4AF6A" opacity="0.85" transform="rotate(120)"/>
    <polygon points="0,-43 -4,-17 4,-17" fill="#D4AF6A" opacity="0.65" transform="rotate(150)"/>
    <polygon points="0,-52 -5,-17 5,-17" fill="#D4AF6A" opacity="0.85" transform="rotate(180)"/>
    <polygon points="0,-43 -4,-17 4,-17" fill="#D4AF6A" opacity="0.65" transform="rotate(210)"/>
    <polygon points="0,-52 -5,-17 5,-17" fill="#D4AF6A" opacity="0.85" transform="rotate(240)"/>
    <polygon points="0,-43 -4,-17 4,-17" fill="#D4AF6A" opacity="0.65" transform="rotate(270)"/>
    <polygon points="0,-52 -5,-17 5,-17" fill="#D4AF6A" opacity="0.85" transform="rotate(300)"/>
    <polygon points="0,-43 -4,-17 4,-17" fill="#D4AF6A" opacity="0.65" transform="rotate(330)"/>
  </g>

  <!-- Sun circle — warm gold gradient -->
  <circle cx="120" cy="88" r="18" fill="url(#sunGold)"/>
  <circle cx="120" cy="88" r="13" fill="#D4AF6A" opacity="0.4"/>

  <!-- Stylized leaves — white/light green on deep green -->

  <!-- Left outer leaf -->
  <path d="M62 205 C48 168, 50 125, 78 85
           C83 97, 80 120, 78 142
           C76 162, 70 185, 62 205 Z" fill="#22C55E" opacity="0.7"/>

  <!-- Left inner leaf -->
  <path d="M82 198 C70 165, 68 132, 90 98
           C93 108, 91 128, 89 148
           C87 168, 85 185, 82 198 Z" fill="#16A34A" opacity="0.6"/>

  <!-- Center leaf/stem -->
  <path d="M120 205 C114 170, 112 138, 120 102
           C128 138, 126 170, 120 205 Z" fill="#15803D" opacity="0.5"/>

  <!-- Right inner leaf -->
  <path d="M158 198 C170 165, 172 132, 150 98
           C147 108, 149 128, 151 148
           C153 168, 155 185, 158 198 Z" fill="#16A34A" opacity="0.6"/>

  <!-- Right outer leaf -->
  <path d="M178 205 C192 168, 190 125, 162 85
           C157 97, 160 120, 162 142
           C164 162, 170 185, 178 205 Z" fill="#22C55E" opacity="0.7"/>

  <!-- Company name — stacked wordmark in brand style -->
  <text x="120" y="224" text-anchor="middle"
        fill="#D4AF6A" font-family="Poppins, sans-serif"
        font-weight="500" font-size="11" letter-spacing="3">GLOBAL RESOURCES</text>
  <text x="120" y="248" text-anchor="middle"
        fill="#FFFFFF" font-family="Poppins, sans-serif"
        font-weight="700" font-size="18" letter-spacing="4">CITADEL</text>
  <text x="120" y="262" text-anchor="middle"
        fill="rgba(255,255,255,0.5)" font-family="Poppins, sans-serif"
        font-weight="300" font-size="7" letter-spacing="4">LIMITED</text>
</svg>
